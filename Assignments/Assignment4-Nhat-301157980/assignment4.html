<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-4</title>
    <link rel="stylesheet" href="../../css/assignment4.css" type="text/css">
</head>

<body>
    <div class="container">
        <form action="#" id="form">
            <h1>Member registration</h1>
            <h4>Please complete all fields below:</h4>
            <div class="form-input">
                <input id="first-name" type="text" placeholder="First Name">
                <small></small>
            </div>
            <div class="form-input">
                <input id="last-name" type="text" placeholder="Last Name">
                <small></small>
            </div>
            <div class="form-input">
                <input id="address" type="text" placeholder="Address">
                <small></small>
            </div>
            <div class="form-input">
                <input id="city" type="text" placeholder="City">
                <small></small>
            </div>
            <div class="form-input">
                <input id="post-code" type="text" placeholder="Postal Code">
                <small></small>
            </div>
            <div class="form-input">
                <input id="province" type="text" placeholder="Province">
                <small></small>
            </div>
            <div class="form-input">
                <input id="age" type="number" placeholder="Age">
                <small></small>
            </div>
            <div class="form-input">
                <input id="password" type="password" placeholder="Password">
                <small></small>
            </div>
            <div class="form-input">
                <input id="confirm-password" type="password" placeholder="Confirm Password">
                <small></small>
            </div>
            <div class="form-input">
                <input id="email" type="text" placeholder="Email">
                <small></small>
            </div>
            <div class="button-container">
                <button type="submit" id="submit-button">Register Now</button>
                <button type="reset" id="reset-button">Clear Form</button>
            </div>            
        </form>
        <footer>
            <h6>&copy; Nhat Phuc Nguyen - 301157980</h6>
        </footer>
    </div>
    <script src="../../javascript/assignment4.js" type="text/javascript"></script>
</body>

</html>
