<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-1</title>
    <link rel="stylesheet" type="text/css" href="assignment1.css">
    <script src="https://kit.fontawesome.com/934e9ccf15.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="form-container">
            <form class="bmrForm" action="#" onsubmit="return false">
                <h3>Basal Metabolic Rate Calculator</h3>
                <div class="unit-option">
                    <span>Select kind of measurements: </span>
                    <input id="metric" type="radio" name="unit" onclick="unitCheck()" checked>
                    <span>Metric</span>
                    <input id="imperial" type="radio" name="unit" onclick="unitCheck()">
                    <span>Imperial</span>
                </div>
                <div class="info">
                    <select name="gender" id="gender-option" required>
                        <option value="" selected disabled>Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                    <div>
                        <input placeholder="Weight" type="number" id="weight" min="0" max="1000" step="0.1" required>
                        <span id="unit-weight">kg</span>
                    </div>
                    <div class="height-input">
                        <div class="metric-display">
                            <input placeholder="Height" type="number" id="height" min="0" step="1" max="300" required>
                            <span id="unit-height">cm</span>
                        </div>
                        <div class="imperial-display">
                            <input placeholder="Height" type="number" id="feet" min="1" step="1" max="300" required>
                            <span id="unit-feet">feet</span>
                            <input placeholder="Height" type="number" id="inches" min="0" step="1" max="300" value="0"
                                required>
                            <span id="unit-inches">inches</span>
                        </div>
                    </div>
                    <div>
                        <input placeholder="Age" type="number" name="age" id="age" min="1" max="200" required>
                        <span id="unit-age">years</span>
                    </div>
                    <div>
                        <select name="activity-level" id="activity-level" required>
                            <option value="" selected disabled>Activity level</option>
                            <option value="0">No sport/exercise</option>
                            <option value="1">Light activity (sport 1-3 times per week)</option>
                            <option value="2">Moderate activity (sport 3-5 times per week)</option>
                            <option value="3">High activity (everyday exercise)</option>
                            <option value="4">Extreme activity (professional athlete)</option>
                        </select>
                    </div>
                    <div class="btn-container">
                        <input type="submit" name="submit" id="submit-btn" value="Calculate">
                        <input type="reset" value="Reset" onclick="document.location.reload(true)">
                    </div>
                </div>
            </form>
        </div>
    </div>
    <div class="modal-container">
        <div class="result-modal">
            <h3>Result !</h3>
            <p>
                Your BMR is: <span id="bmr-number">000</span> calories/day
            </p>
            <p>
                To maintain your current weight at your current activity level you need <span
                    id="calories-need">000</span> calories per day.
            </p>
            <button class="close-btn">
                <i class="fas fa-times fa-2xl"></i>
            </button>
        </div>
    </div>
    <script src="assignment1.js"></script>
</body>

</html>
